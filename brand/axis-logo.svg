<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a2844"/>
      <stop offset="70%" stop-color="#0f1828"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dd3e0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#7dd3e0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7dd3e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f7fa" stop-opacity="1"/>
      <stop offset="60%" stop-color="#7dd3e0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7dd3e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Soft accent halo -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer diamond -->
  <path d="M 256 80 L 432 256 L 256 432 L 80 256 Z"
        fill="none" stroke="#7dd3e0" stroke-width="3"
        stroke-linejoin="round" opacity="0.7"/>

  <!-- Inner diamond -->
  <path d="M 256 160 L 352 256 L 256 352 L 160 256 Z"
        fill="none" stroke="#7dd3e0" stroke-width="2.2"
        stroke-linejoin="round" opacity="0.5"/>

  <!-- Core glow -->
  <circle cx="256" cy="256" r="64" fill="url(#core)" opacity="0.85"/>

  <!-- Core dot -->
  <circle cx="256" cy="256" r="14" fill="#e8f7fa"/>

  <!-- Cardinal markers -->
  <circle cx="256" cy="42" r="4.5" fill="#7dd3e0" opacity="0.6"/>
  <circle cx="470" cy="256" r="4.5" fill="#7dd3e0" opacity="0.6"/>
  <circle cx="256" cy="470" r="4.5" fill="#7dd3e0" opacity="0.6"/>
  <circle cx="42" cy="256" r="4.5" fill="#7dd3e0" opacity="0.6"/>
</svg>
